# hooks.test.yaml — verify SessionStart hook injects skill-first reminder

description: carta-investors hooks — SessionStart skill-first injection

prompts:
  - "{{prompt}}"

tests:
  # SessionStart hook — Skill tool invoked before MCP tool calls
  - description: "SessionStart hook → Skill tool invoked before any MCP call"
    vars:
      prompt: "Show me NAV for all my funds."
      env:
        pluginDir: ./plugins/carta-investors
        mcpServers: [carta]
    assert:
      - type: contains
        value: "[TOOL_CALL] Skill"
