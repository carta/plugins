# data-skills.test.yaml — carta-investors data fetch skills via MCP

description: carta-investors data skills — return real data from Carta DWH

defaultTest:
  vars:
    mode: plugin
    env:
      pluginDir: ./plugins/carta-investors
      mcpServers: [carta]

prompts:
  - "{{prompt}}"

tests:
  # explore-data — NAV summary
  - description: "explore-data → returns fund NAV table"
    vars:
      prompt: "Show me NAV for all my funds."
      skill: carta-investors:explore-data
    assert:
      - type: llm-rubric
        value: "Response includes a table or list with fund names and NAV amounts (dollar values)"
      - type: javascript
        value: "!output.includes('[TOOL_CALL] AskUserQuestion')"

  # explore-data — investments query
  - description: "explore-data → returns portfolio company list"
    vars:
      prompt: "List the portfolio companies across my funds."
      skill: carta-investors:explore-data
    assert:
      - type: llm-rubric
        value: "Response includes a list or table of portfolio company names"
      - type: javascript
        value: "!output.includes('[TOOL_CALL] AskUserQuestion')"

  # performance-benchmarks — asks for fund name when not provided
  - description: "performance-benchmarks → asks for fund name if not provided"
    vars:
      prompt: "Show me benchmark data for our funds."
      skill: carta-investors:performance-benchmarks
    assert:
      - type: llm-rubric
        value: "Response either shows benchmark data for one or more funds, or asks the user to specify a fund name"

  # form-adv — asks for reporting date when not provided
  - description: "form-adv → asks for reporting date if not provided"
    vars:
      prompt: "Pull our Form ADV data."
      skill: carta-investors:form-adv
    assert:
      - type: contains
        value: "[TOOL_CALL] AskUserQuestion"
      - type: llm-rubric
        value: "Response asks the user to provide a reporting date (YYYY-MM-DD format or year)"

  # form-adv — returns regulatory data when date is provided
  - description: "form-adv → returns regulatory AUM data with reporting date"
    vars:
      prompt: "Pull our Form ADV data as of December 31 2024."
      skill: carta-investors:form-adv
    assert:
      - type: llm-rubric
        value: "Response includes a table with fund-level regulatory data including at least one of: Regulatory AUM, NAV, Fair Market Value, or Total Gross Assets"
      - type: javascript
        value: "!output.toLowerCase().includes('error') || output.toLowerCase().includes('no data') || output.includes('$')"
